<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>NusaDrive - Register</title>
        <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body class="auth-page">

        <div class="container">

            <div class="left">
                <img src="assets/rental-banner.jpg" alt="Interior Mobil" />
            </div>

            <div class="card">
                <div class="logo">
                    <img src="assets/logo.svg" alt="NusaDrive Logo" width="100" />
                    <h1>NusaDrive</h1>
                </div>

                <div class="error-msg" id="errorMsg"></div>
                <div class="success-msg" id="successMsg"></div>

                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" autocomplete="email" />
                </div>

                <div class="form-group">
                    <input type="text" id="nama" placeholder="Nama Lengkap" autocomplete="name" />
                </div>

                <div class="form-group">
                    <input type="tel" id="no_telp" placeholder="No. Telp" autocomplete="tel" />
                </div>

                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" autocomplete="new-password" />
                </div>

                <button class="btn-primary" onclick="handleRegister()">Register</button>

                <div class="auth-link">
                    Sudah punya akun? <a href="index.html">Login</a>
                </div>
            </div>
        </div>
        <script src="js/auth.js"></script>
    </body>
</html>
