<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>NusaDrive - Car Management</title>
        <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body class="admin-page">

        <nav>
            <div class="nav-logo">
                <img src="../assets/logo-white.svg" alt="NusaDrive" />
            </div>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="cars.html" class="active">Mobil</a></li>
                    <li><a href="customers.html">Customer</a></li>
                    <li><a href="rentals.html">Transaksi</a></li>
                </ul>
                <button class="nav-logout" onclick="handleLogout()" title="Logout">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </nav>

        <div class="content">
            <div class="top-bar">
                <div class="section-title">Data Mobil</div>
                <button class="btn-add" onclick="openModal()">+ Tambah Mobil</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nama Mobil</th>
                            <th>Plat</th>
                            <th>Tarif/hari</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="carsTable">
                        <tr>
                            <td colspan="6" style="color:#9CA3AF;">Memuat data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center;">
            <div style="background:#fff; border-radius:16px; padding:32px; width:400px; max-width:90%;">
                <h2 id="modalTitle" style="font-size:18px; font-weight:700; margin-bottom:20px;">Tambah Mobil</h2>

                <div class="form-group">
                    <input type="text" id="f-nama" placeholder="Nama Mobil" autocomplete="off" />
                </div>
                <div class="form-group">
                    <input type="text" id="f-plat" placeholder="Plat (contoh: B 1234 AB)" autocomplete="off" />
                </div>
                <div class="form-group">
                    <input type="number" id="f-kursi" placeholder="Jumlah Kursi" autocomplete="off" />
                </div>
                <div class="form-group">
                    <input type="text" id="f-tarif" placeholder="Tarif per hari (Rp)" autocomplete="off" />
                </div>
                <div class="form-group">
                    <input type="text" id="f-gambar" placeholder="Nama file gambar (contoh: innova.jpg)" autocomplete="off" />
                </div>

                <div class="error-msg" id="modalError"></div>

                <div style="display:flex; gap:10px; margin-top:8px;">
                    <button class="btn-primary" style="flex:1" onclick="submitMobil()">Simpan</button>
                    <button onclick="closeModal()" style="flex:1; padding:13px; border:1.5px solid #D1D5DB; border-radius:10px; background:#fff; font-size:15px; cursor:pointer; font-family:inherit;">Batal</button>
                </div>
            </div>
        </div>

        <script src="../js/auth.js"></script>
        <script src="../js/adminCars.js"></script>
    </body>
</html>
