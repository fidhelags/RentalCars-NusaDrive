<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NusaDrive - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Afacad', system-ui, sans-serif;
            background: #F5F6FA;
            min-height: 100vh;
        }

        nav {
            background: #1A3A6B;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 36px;
        }

        .nav-logo img {
            height: 36px;
        }

        .nav-links {
            display: flex;
            gap: 36px;
            list-style: none;
        }

        .nav-links a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            padding-bottom: 4px;
            transition: color 0.2s;
            }

        .nav-links a:hover {
            color: #fff;
        }

        .nav-links a.active {
            color: #fff;
            border-bottom: 2px solid #fff;
        }

        .nav-logout {
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,0.75);
            font-size: 22px;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .nav-logout:hover {
            color: #fff;
        }

        .content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 36px 24px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 36px;
        }

        .stat-card {
            background: #E6F1FB;
            border-radius: 16px;
            padding: 24px 28px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1A3A6B;
            margin-bottom: 12px;
        }

        .stat-card p {
            font-size: 48px;
            font-weight: 700;
            color: #111;
            line-height: 1;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #111;
            margin-bottom: 16px;
        }

        .table-wrap {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #E5E7EB;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        thead tr {
            background: #1A3A6B;
        }

        thead th {
            padding: 14px 20px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        tbody tr {
            border-bottom: 1px solid #F0F0F0;
            transition: background 0.15s;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #F9FAFB;
        }

        tbody td {
            padding: 14px 20px;
            font-size: 15px;
            color: #374151;
            text-align: center;
        }

        .badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 500;
        }

        .badge-aktif {
            background: #D1FAE5;
            color: #065F46;
        }

        .badge-selesai {
            background: #E6F1FB;
            color: #1A3A6B;
        }

        .badge-pending {
            background: #FEF3C7;
            color: #92400E;
        }

        .badge-dibatalkan {
            background: #FEE2E2;
            color: #991B1B;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">
            <img src="../assets/logo-white.svg" alt="NusaDrive" />
        </div>
        <div class="nav-right">
            <ul class="nav-links">
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
            <li><a href="cars.html">Mobil</a></li>
            <li><a href="customers.html">Customer</a></li>
            <li><a href="rentals.html">Transaksi</a></li>
            </ul>
            <button class="nav-logout" onclick="handleLogout()" title="Logout">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            </button>
        </div>
    </nav>

    <div class="content">
        <div class="stat-grid">
        <div class="stat-card">
            <h2>Total Mobil</h2>
            <p id="totalMobil">-</p>
        </div>
        <div class="stat-card">
            <h2>Disewa</h2>
            <p id="totalDisewa">-</p>
        </div>
        <div class="stat-card">
            <h2>Tersedia</h2>
            <p id="totalTersedia">-</p>
        </div>
        <div class="stat-card">
            <h2>Total Customer</h2>
            <p id="totalCustomer">-</p>
        </div>
        </div>

        <div class="section-title">Transaksi Terbaru</div>
        <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Mobil</th>
                <th>Total</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody id="transaksiTable">
            <tr>
                <td colspan="5" style="text-align:center; color:#9CA3AF;">Memuat data...</td>
            </tr>
            </tbody>
        </table>
        </div>

    </div>

    <script>
        // Cek apakah user sudah login dan rolenya admin
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'admin') {
        window.location.href = '../index.html';
        }

        // Format angka ke Rupiah
        function formatRupiah(angka) {
        return 'Rp ' + angka.toLocaleString('id-ID');
        }

        // Badge status
        function badgeStatus(status) {
            const map = {
                'aktif': 'badge-aktif',
                'selesai': 'badge-selesai',
            };
            const cls = map[status] || 'badge-aktif';
            return `<span class="badge ${cls}">${status.charAt(0).toUpperCase() + status.slice(1)}</span>`;
        }

        // Load semua data
        async function loadDashboard() {
        try {
            // Fetch mobil
            const resCars = await fetch('http://localhost:3000/api/cars');
            const cars = await resCars.json();

            document.getElementById('totalMobil').textContent = cars.length;
            document.getElementById('totalDisewa').textContent = cars.filter(c => c.status === 'disewa').length;
            document.getElementById('totalTersedia').textContent = cars.filter(c => c.status === 'tersedia').length;

            // Fetch users
            const resUsers = await fetch('http://localhost:3000/api/users');
            const users = await resUsers.json();
            const userOnly = users.filter(c => c.role === 'customer');
            document.getElementById('totalCustomer').textContent = userOnly.length;

            // Fetch rentals
            const resRent = await fetch('http://localhost:3000/api/rentals');
            const rentals = await resRent.json();

            // Tampilkan 5 transaksi terbaru
            const recent = rentals.slice(-5).reverse();
            const tbody = document.getElementById('transaksiTable');

            if (recent.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#9CA3AF;">Belum ada transaksi.</td></tr>';
            return;
            }

            tbody.innerHTML = recent.map((trx, i) => {
            const user = users.find(c => c.id === trx.customer_id);
            const car = cars.find(c => c.id === trx.mobil_id);
            return `
                <tr>
                <td>${i + 1}</td>
                <td>${user ? user.nama : '-'}</td>
                <td>${car ? car.nama + ' (' + car.plat + ')' : '-'}</td>
                <td>${formatRupiah(trx.total_biaya)}</td>
                <td>${badgeStatus(trx.status)}</td>
                </tr>
            `;
            }).join('');

        } catch (err) {
            console.error(err);
        }
        }

        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../index.html';
        }

        loadDashboard();
    </script>

</body>
</html>
