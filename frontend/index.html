<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NusaDrive - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1A3A6B 0%, #2563A8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Afacad', system-ui, sans-serif;
            padding: 24px;
        }

        .container {
            display: flex;
            gap: 40px;
            align-items: center;
            max-width: 900px;
            width: 100%;
        }

        .left {
            flex: 1;
            border-radius: 20px;
            overflow: hidden;
            max-height: 480px;
        }

        .left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 40px 36px;
            width: 360px;
            flex-shrink: 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo svg {
            width: 60px;
            height: auto;
            margin-bottom: 8px;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: #111;
            letter-spacing: -0.3px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #D1D5DB;
            border-radius: 10px;
            font-size: 14px;
            color: #111;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: #9CA3AF;
        }

        .form-group input:focus {
            border-color: #1A3A6B;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #1A3A6B;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 13px;
            color: #374151;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .btn-login:hover {
            background: #1A3A6B;
        }

        .register-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #6B7280;
        }

        .register-link a {
            color: #1A3A6B;
            font-weight: 500;
            text-decoration: underline;
            cursor: pointer;
        }

        .error-msg {
            background: #FEE2E2;
            color: #991B1B;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="left">
            <img src="assets/rental-banner.jpg" alt="Interior Mobil" />
        </div>

        <div class="card">
            <div class="logo">
                <img src="assets/logo.svg" alt="NusaDrive Logo" width="100" />
                <h1>NusaDrive</h1>
            </div>

            <div class="error-msg" id="errorMsg">Email atau Password salah.</div>

            <div class="form-group">
                <input type="email" id="email" placeholder="Email" />
            </div>

            <div class="form-group">
                <input type="password" id="password" placeholder="Password" />
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="isAdmin" />
                <label for="isAdmin">Login sebagai Admin</label>
            </div>

            <button class="btn-login" onclick="handleLogin()">Login</button>

            <div class="register-link">
                Belum punya akun? <a href="register.html">Register</a>
            </div>
        </div>

    </div>

    <script>
        async function handleLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const isAdmin = document.getElementById('isAdmin').checked;
        const errorMsg = document.getElementById('errorMsg');

        errorMsg.style.display = 'none';

        if (!email || !password) {
                errorMsg.textContent = 'Email dan Password wajib diisi.';
                errorMsg.style.display = 'block';
                return;
        }

        try {
            const res = await fetch('http://localhost:3000/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, isAdmin })
            });

            const data = await res.json();

            if (!res.ok) {
                errorMsg.textContent = data.message || 'Login gagal.';
                errorMsg.style.display = 'block';
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));

            if (data.user.role === 'admin') {
                window.location.href = 'admin/dashboard.html';
                } else {
                window.location.href = 'customer/dashboard.html';
            }

        } catch (err) {
            errorMsg.textContent = 'Tidak dapat terhubung ke server.';
            errorMsg.style.display = 'block';
        }
    }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
            });
    </script>

</body>
</html>
