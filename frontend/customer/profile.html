<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>NusaDrive - Profil</title>
        <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body class="customer-page">

        <nav>
            <div class="nav-logo">
                <img src="../assets/logo-white.svg" alt="NusaDrive" />
            </div>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="transactions.html">Transaksi</a></li>
                    <li><a href="profile.html" class="active">Profil</a></li>
                </ul>
                <button class="nav-logout" onclick="handleLogout()" title="Logout">
                    <img src="../assets/exit.svg" alt="Logout" width="24" height="24">
                </button>
            </div>
        </nav>

        <div class="content" style="display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 64px);">
            <div class="card">
                <div class="logo">
                    <img src="../assets/logo.svg" alt="NusaDrive Logo" width="80" />
                    <h1>Profil Saya</h1>
                </div>

                <div class="error-msg" id="errorMsg"></div>
                <div class="success-msg" id="successMsg"></div>

                <div class="form-group">
                    <input type="text" id="nama" placeholder="Nama Lengkap" autocomplete="name" />
                </div>

                <div class="form-group">
                    <input type="email" id="email" placeholder="Email" autocomplete="email" />
                </div>

                <div class="form-group">
                    <input type="tel" id="no_telp" placeholder="No. Telp" autocomplete="tel" />
                </div>

                <div class="form-group">
                    <input type="password" id="password" placeholder="Password baru (kosongkan jika tidak diubah)" autocomplete="new-password" />
                </div>

                <button class="btn-primary" onclick="handleUpdateProfil()">Simpan Perubahan</button>

                <div style="border-top: 1px solid #F0F0F0; margin: 20px 0;"></div>

                <button onclick="handleDeleteAkun()" style="width:100%; padding:13px; background:#fff; color:#991B1B; border:1.5px solid #991B1B; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; font-family:'Afacad',sans-serif; transition: all 0.2s;" onmouseover="this.style.background='#FEE2E2'" onmouseout="this.style.background='#fff'">
                    Hapus Akun
                </button>
            </div>
        </div>

        <script src="../js/auth.js"></script>
        <script src="../js/customerProfile.js"></script>
    </body>
</html>
