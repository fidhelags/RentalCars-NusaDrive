<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>NusaDrive - Payment</title>
        <link href="https://fonts.googleapis.com/css2?family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body class="customer-page">

        <nav>
            <div class="nav-logo">
                <img src="../assets/logo-white.svg" alt="NusaDrive" />
            </div>
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="transactions.html">Transaksi</a></li>
                    <li><a href="profile.html">Profil</a></li>
                </ul>
                <button class="nav-logout" onclick="handleLogout()" title="Logout">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </nav>

        <div class="content" style="display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 64px);">
            <div class="card" style="width:420px;">

                <div id="carInfo" style="border:1.5px solid #E5E7EB; border-radius:12px; overflow:hidden; margin-bottom:20px;">
                    <div id="carImg" style="width:100%; height:180px; background:#F5F6FA; display:flex; align-items:center; justify-content:center; color:#9CA3AF; font-size:13px;">
                        Memuat...
                    </div>
                    <div style="padding:12px 16px;">
                        <div id="carNama" style="font-size:18px; font-weight:700; color:#111; margin-bottom:4px;">-</div>
                        <div id="carDetail" style="font-size:13px; color:#6B7280; margin-bottom:4px;">-</div>
                        <div id="carTarif" style="font-size:15px; font-weight:600; color:#111;">-</div>
                    </div>
                </div>

                <div class="error-msg" id="errorMsg"></div>
                <div class="success-msg" id="successMsg"></div>

                <div class="form-group">
                    <label style="font-size:13px; color:#6B7280; margin-bottom:6px; display:block;">Tanggal Mulai</label>
                    <input type="date" id="tanggal_mulai" onchange="hitungTotal()" style="width:100%; padding:13px 16px; border:1.5px solid #D1D5DB; border-radius:10px; font-size:15px; font-family:'Afacad',sans-serif; outline:none;" />
                </div>

                <div class="form-group">
                    <label style="font-size:13px; color:#6B7280; margin-bottom:6px; display:block;">Tanggal Selesai</label>
                    <input type="date" id="tanggal_selesai" onchange="hitungTotal()" style="width:100%; padding:13px 16px; border:1.5px solid #D1D5DB; border-radius:10px; font-size:15px; font-family:'Afacad',sans-serif; outline:none;" />
                </div>

                <div class="form-group">
                    <label style="font-size:13px; color:#6B7280; margin-bottom:6px; display:block;">Metode Pembayaran</label>
                    <select id="metode_pembayaran" style="width:100%; padding:13px 16px; border:1.5px solid #D1D5DB; border-radius:10px; font-size:15px; font-family:'Afacad',sans-serif; outline:none; color:#111;">
                        <option value="">Pilih metode</option>
                        <option value="transfer">Transfer Bank</option>
                        <option value="cash">Cash</option>
                    </select>
                </div>

                <div id="totalBox" style="display:none; background:#E6F1FB; border-radius:10px; padding:14px 16px; margin-bottom:16px;">
                    <div style="font-size:13px; color:#1A3A6B; margin-bottom:4px;" id="hariInfo">-</div>
                    <div style="font-size:18px; font-weight:700; color:#1A3A6B;" id="totalBiaya">-</div>
                </div>

                <button class="btn-primary" id="btnBayar" onclick="handleBayar()">Bayar Sekarang</button>

            </div>
        </div>

        <script src="/js/auth.js"></script>
        <script src="/js/customerPayment.js"></script>
    </body>
</html>
